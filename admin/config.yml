backend:
  name: github
  repo: batteryandbeyond/battery
  branch: main
  base_url: https://sveltia-cms-auth.batteryandbeyond.workers.dev

media_folder: "images"
public_folder: "/images"

collections:
  - name: "articles"
    label: "Articles"
    folder: "content/articles"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - label: "Categories"
        name: "category"
        widget: "select"
        multiple: true
        options:
          - "General"
          - "Slurry"
          - "Coating"
          - "Drying"
          - "Calendaring"
          - "Slitting"
          - "Assembly"
          - "Formation & Aging"
          - "EOL Testing"
          - "Design Parameters"
          - "News"
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Cover Image", name: "image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "news"
    label: "News"
    folder: "content/news"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
